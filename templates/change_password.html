<!DOCTYPE html>
<html lang="ko">
<head>
<title>비밀번호 변경 — {{ project_name }}</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --accent:  #2f81f7;
  --accent2: #388bfd;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --danger:  #f85149;
  --success: #3fb950;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }

.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-box {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 36px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
  text-decoration: none;
  transition: color .15s;
}
.back-link:hover { color: var(--text); }

.auth-icon { font-size: 36px; margin-bottom: 12px; display: block; }
.auth-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--accent); }

.btn-submit {
  width: 100%;
  margin-top: 8px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  border: none;
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.msg-box {
  margin-top: 16px;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
}
.msg-box.error {
  background: rgba(248,81,73,0.1);
  border: 1px solid rgba(248,81,73,0.3);
  color: var(--danger);
}
.msg-box.success {
  background: rgba(63,185,80,0.1);
  border: 1px solid rgba(63,185,80,0.3);
  color: var(--success);
}
.msg-box.hidden { display: none; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <a class="back-link" href="/files/{{ project_key }}">← {{ project_name }}으로</a>
    <span class="auth-icon">🔑</span>
    <div class="auth-title">비밀번호 변경</div>
    <div class="auth-sub">{{ project_name }}의 접속 비밀번호를 변경합니다.</div>

    <form id="pwForm">
      <div class="field">
        <label>현재 비밀번호</label>
        <input type="password" id="old_pw" placeholder="현재 비밀번호" required>
      </div>
      <div class="field">
        <label>새 비밀번호</label>
        <input type="password" id="new_pw" placeholder="새 비밀번호 (4자 이상)" minlength="4" required>
      </div>
      <div class="field">
        <label>새 비밀번호 확인</label>
        <input type="password" id="confirm_pw" placeholder="새 비밀번호 다시 입력" minlength="4" required>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">비밀번호 변경</button>
    </form>

    <div id="msgBox" class="msg-box hidden"></div>
  </div>
</div>

<script>
document.getElementById('pwForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msgBox = document.getElementById('msgBox');
  const submitBtn = document.getElementById('submitBtn');

  const old_pw = document.getElementById('old_pw').value;
  const new_pw = document.getElementById('new_pw').value;
  const confirm_pw = document.getElementById('confirm_pw').value;

  if (new_pw !== confirm_pw) {
    msgBox.className = 'msg-box error';
    msgBox.textContent = '⚠ 새 비밀번호가 일치하지 않습니다.';
    return;
  }
  if (new_pw.length < 4) {
    msgBox.className = 'msg-box error';
    msgBox.textContent = '⚠ 비밀번호는 4자 이상이어야 합니다.';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '변경 중...';

  try {
    const res = await fetch('/change-password/{{ project_key }}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ old_pw, new_pw })
    });
    const data = await res.json();
    msgBox.className = 'msg-box ' + (data.ok ? 'success' : 'error');
    msgBox.textContent = data.ok ? '✅ ' + data.msg : '⚠ ' + data.msg;
    submitBtn.disabled = false;
    submitBtn.textContent = '비밀번호 변경';
  } catch (err) {
    msgBox.className = 'msg-box error';
    msgBox.textContent = '⚠ 네트워크 오류';
    submitBtn.disabled = false;
    submitBtn.textContent = '비밀번호 변경';
  }
});
</script>
</body>
</html>
