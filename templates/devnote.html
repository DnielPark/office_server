<!DOCTYPE html>
<html lang="ko">
<head>
<title>서천군 재해복구사업</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
 --bg: #0d1117;
 --surface: #161b22;
 --border: #30363d;
 --accent: #2f81f7;
 --accent2: #388bfd;
 --text: #e6edf3;
 --muted: #8b949e;
}
body {
 font-family: 'Noto Sans KR', sans-serif;
 background: var(--bg);
 color: var(--text);
 min-height: 100vh;
 overflow-x: hidden;
}
a { color: var(--accent); text-decoration: none; }

/* ── 파티클 캔버스 ── */
#particle-canvas {
 position: fixed;
 top: 0; left: 0;
 width: 100%; height: 100%;
 z-index: 0;
 pointer-events: none;
}

.wrapper {
 position: relative;
 z-index: 1;
 max-width: 960px;
 margin: 0 auto;
 padding: 60px 24px 80px;
}

/* 헤더 */
.site-header { text-align: center; margin-bottom: 64px; }
.logo-mark {
 display: inline-flex;
 align-items: center;
 gap: 14px;
 margin-bottom: 20px;
}
.logo-icon {
 width: 52px; height: 52px;
 background: linear-gradient(135deg, #2f81f7 0%, #388bfd 100%);
 border-radius: 14px;
 display: flex; align-items: center; justify-content: center;
 font-size: 26px;
 box-shadow: 0 4px 20px rgba(47,129,247,0.35);
}
.logo-text { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.logo-sub {
 font-size: 13px;
 color: var(--muted);
 font-family: 'IBM Plex Mono', monospace;
 letter-spacing: 0.08em;
 margin-top: 4px;
}
.header-divider {
 width: 48px; height: 2px;
 background: linear-gradient(90deg, var(--accent), transparent);
 margin: 24px auto 0;
}

/* 섹션 */
.section-label {
 font-size: 11px;
 font-weight: 600;
 letter-spacing: 0.18em;
 color: var(--muted);
 text-transform: uppercase;
 font-family: 'IBM Plex Mono', monospace;
 margin-bottom: 20px;
}

/* 카드 */
.card-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
 gap: 16px;
}
.project-card {
 background: rgba(22,27,34,0.75);
 backdrop-filter: blur(8px);
 -webkit-backdrop-filter: blur(8px);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 28px 24px;
 position: relative;
 overflow: hidden;
 display: block;
 color: var(--text);
 transition: border-color .18s, transform .18s, box-shadow .18s;
}
.project-card::before {
 content: '';
 position: absolute;
 top: 0; left: 0; right: 0;
 height: 2px;
 background: linear-gradient(90deg, var(--accent), transparent);
 opacity: 0;
 transition: opacity .18s;
}
.project-card:hover {
 border-color: var(--accent);
 transform: translateY(-3px);
 box-shadow: 0 8px 24px rgba(47,129,247,0.15);
 color: var(--text);
}
.project-card:hover::before { opacity: 1; }

.card-badge {
 display: inline-block;
 font-size: 10px;
 font-family: 'IBM Plex Mono', monospace;
 font-weight: 500;
 letter-spacing: 0.1em;
 background: rgba(47,129,247,0.12);
 color: var(--accent);
 border: 1px solid rgba(47,129,247,0.25);
 border-radius: 4px;
 padding: 2px 8px;
 margin-bottom: 16px;
}
.card-name { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
.card-desc { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.card-arrow {
 position: absolute;
 bottom: 20px; right: 20px;
 font-size: 18px;
 color: var(--border);
 transition: color .18s, right .18s;
}
.project-card:hover .card-arrow { color: var(--accent); right: 16px; }

/* 푸터 */
.site-footer {
 text-align: center;
 margin-top: 72px;
 font-size: 12px;
 color: var(--muted);
 font-family: 'IBM Plex Mono', monospace;
 border-top: 1px solid var(--border);
 padding-top: 28px;
}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="wrapper">
  <header class="site-header">
    <div class="logo-mark">
      <div class="logo-icon">🏗</div>
      <div>
        <div class="logo-text">서천군 재해복구사업</div>
        <div class="logo-sub">성산천 사업관리단</div>
      </div>
    </div>
    <div class="header-divider"></div>
  </header>

  <p class="section-label">프로젝트 선택</p>
  <div class="card-grid">
    {% for key, info in projects.items() %}
    <div class="project-card">
      <div class="card-badge">{{ key }}</div>
      <div class="card-name">{{ info.name }}</div>
      <div class="card-desc"><span>🔒</span><span>비밀번호 필요</span></div>
      <div class="card-arrow">→</div>
    </div>
    {% endfor %}

  </div>

  <!-- 레트로 게임 -->
  <div id="retro-game" style="margin-top: 48px;"></div>
  <script src="/static/js/retro-game.js?v=5"></script>

  <footer class="site-footer">
© 2026 성산천 사업관리단 &nbsp;·&nbsp; 내부 자료 공유 전용
<br>
관리자 : 박대호 &nbsp;·&nbsp; daeho1001@nate.com
<br><br>
  </footer>
</div>

<script>
(function() {
 const canvas = document.getElementById("particle-canvas");
 const ctx = canvas.getContext("2d");

 // ── 파라미터 (여기서 튜닝) ──
 const PARTICLE_COUNT = 80;     // 파티클 수
 const MAX_DIST = 140;          // 연결선 최대 거리
 const PARTICLE_SPEED = 0.8;    // 이동 속도
 const PARTICLE_RADIUS = 2;     // 점 크기
 const LINE_WIDTH = 0.6;        // 선 굵기
 const ACCENT = "47,129,247";   // RGB (accent 색)
 const MOUSE_RADIUS = 160;      // 마우스 반응 반경
 const MOUSE_FORCE = 0.12;      // 마우스 당김 강도

 let W, H, mouse = { x: -9999, y: -9999 };
 let particles = [];

 function resize() {
   W = canvas.width = window.innerWidth;
   H = canvas.height = window.innerHeight;
 }

 function Particle() {
   this.x = Math.random() * W;
   this.y = Math.random() * H;
   this.vx = (Math.random() - 0.5) * PARTICLE_SPEED;
   this.vy = (Math.random() - 0.5) * PARTICLE_SPEED;
   this.r = PARTICLE_RADIUS * (0.6 + Math.random() * 0.8);
 }

 Particle.prototype.update = function() {
   // 마우스 인력
   var dx = mouse.x - this.x;
   var dy = mouse.y - this.y;
   var dist = Math.sqrt(dx*dx + dy*dy);
   if (dist < MOUSE_RADIUS && dist > 0) {
     var force = (1 - dist / MOUSE_RADIUS) * MOUSE_FORCE;
     this.vx += dx / dist * force;
     this.vy += dy / dist * force;
   }

   // 속도 제한
   var speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
   if (speed > PARTICLE_SPEED * 2.5) {
     this.vx = this.vx / speed * PARTICLE_SPEED * 2.5;
     this.vy = this.vy / speed * PARTICLE_SPEED * 2.5;
   }

   this.x += this.vx;
   this.y += this.vy;

   // 벽 반사
   if (this.x < 0) { this.x = 0; this.vx *= -1; }
   if (this.x > W) { this.x = W; this.vx *= -1; }
   if (this.y < 0) { this.y = 0; this.vy *= -1; }
   if (this.y > H) { this.y = H; this.vy *= -1; }
 };

 function init() {
   particles = [];
   for (var i = 0; i < PARTICLE_COUNT; i++) {
     particles.push(new Particle());
   }
 }

 function draw() {
   ctx.clearRect(0, 0, W, H);

   // 선 그리기
   for (var i = 0; i < particles.length; i++) {
     for (var j = i + 1; j < particles.length; j++) {
       var dx = particles[i].x - particles[j].x;
       var dy = particles[i].y - particles[j].y;
       var d = Math.sqrt(dx*dx + dy*dy);
       if (d < MAX_DIST) {
         var alpha = (1 - d / MAX_DIST) * 0.45;
         ctx.beginPath();
         ctx.strokeStyle = "rgba(" + ACCENT + "," + alpha + ")";
         ctx.lineWidth = LINE_WIDTH;
         ctx.moveTo(particles[i].x, particles[i].y);
         ctx.lineTo(particles[j].x, particles[j].y);
         ctx.stroke();
       }
     }
   }

   // 점 그리기
   for (var i = 0; i < particles.length; i++) {
     var p = particles[i];
     ctx.beginPath();
     ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
     ctx.fillStyle = "rgba(" + ACCENT + ",0.75)";
     ctx.fill();
   }
 }

 function loop() {
   particles.forEach(function(p) { p.update(); });
   draw();
   requestAnimationFrame(loop);
 }

 window.addEventListener("resize", function() { resize(); });
 window.addEventListener("mousemove", function(e) {
   mouse.x = e.clientX;
   mouse.y = e.clientY;
 });
 window.addEventListener("mouseleave", function() {
   mouse.x = -9999;
   mouse.y = -9999;
 });

 resize();
 init();
 loop();
})();
</script>

</body>
</html>
