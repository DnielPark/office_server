<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일요일 공사 승인 요청서 — 문서 작성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --dark: #2a2a2a;
      --mid: #555555;
      --light: #888888;
      --rule: #c0c0c0;
      --pale: #e8e8e8;
      --bg: #0d1117;
      --white: #ffffff;
      --fill-empty: #f9f9f9;
      --surface: #161b22;
      --border: #30363d;
      --accent: #2f81f7;
      --accent2: #388bfd;
      --text: #e6edf3;
      --muted: #8b949e;
      --success: #3fb950;
      --warning: #d29922;

      --serif: 'Noto Serif KR', 'Batang', serif;
      --sans: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      align-items: center; gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: #0d1117;
      flex-shrink: 0; z-index: 10;
    }
    .top-bar .back-btn {
      font-size: 13px; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: var(--sans);
      display: flex; align-items: center; gap: 4px;
      transition: color .15s;
    }
    .top-bar .back-btn:hover { color: var(--accent); }
    .top-bar .title { flex: 1; font-size: 14px; font-weight: 500; }
    .top-bar .title small { color: var(--muted); font-weight: 400; font-size: 12px; }

    #print-btn {
      padding: 6px 16px; border: 1px solid var(--border);
      border-radius: 6px; background: transparent; color: var(--muted);
      font-size: 12px; cursor: pointer;
      transition: all .15s; font-family: var(--sans);
      opacity: 0.4; pointer-events: none;
    }
    #print-btn.active {
      color: var(--text); border-color: var(--accent);
      opacity: 1; pointer-events: auto;
    }
    #print-btn.active:hover { background: var(--accent); color: #fff; }

    /* ── 메인 레이아웃 ── */
    .main-layout { display: flex; height: calc(100vh - 50px); }

    /* ── 왼쪽: A4 미리보기 ── */
    .preview-panel {
      width: 50%; overflow-y: auto; padding: 24px 16px;
      background: #0d1117; border-right: 1px solid var(--border);
    }
    .preview-panel::-webkit-scrollbar { width: 5px; }
    .preview-panel::-webkit-scrollbar-track { background: transparent; }
    .preview-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── A4 페이지 ── */
    .a4-page {
      width: 210mm; min-height: 297mm;
      margin: 0 auto;
      background: var(--white); color: var(--black);
      padding: 18mm 16mm 20mm 18mm;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      position: relative;
    }

    .a4-page .field-value {
      display: inline-block;
      min-width: 30mm; width: 100%;
      color: var(--black);
      font-size: 9pt; line-height: 1.6;
      position: relative;
      transition: background 0.3s;
    }
    .a4-page .field-value.empty {
      color: transparent;
      border-bottom: 1px dashed var(--rule);
      min-height: 5mm;
    }
    .a4-page .field-value.empty::after {
      content: attr(data-placeholder);
      position: absolute; left: 0; top: 0;
      color: var(--pale);
      font-size: 7.5pt; font-style: italic;
      pointer-events: none; white-space: nowrap;
    }
    .a4-page .field-value.highlight {
      animation: fillIn 0.5s ease forwards;
    }
    @keyframes fillIn {
      0% { background: #e0e0e0; }
      100% { background: transparent; }
    }
    .a4-page .field-value.done-highlight {
      animation: fillInGreen 0.5s ease forwards;
    }
    @keyframes fillInGreen {
      0% { background: #c8e6c9; }
      100% { background: transparent; }
    }

    .doc-header {
      text-align: center;
      padding-bottom: 10mm;
      border-bottom: 2.5px solid var(--black);
      margin-bottom: 7mm;
    }
    .doc-header::before {
      content: '';
      display: block; width: 28mm; height: 2px;
      background: var(--black);
      margin: 0 auto 4mm;
    }
    .doc-title {
      font-family: var(--serif); font-size: 22pt;
      font-weight: 700; letter-spacing: 0.15em;
      color: var(--black); line-height: 1.2;
    }
    .doc-subtitle {
      font-size: 8pt; color: var(--light);
      letter-spacing: 0.3em; margin-top: 2mm;
      text-transform: uppercase; font-weight: 300;
    }

    .section { margin-bottom: 5.5mm; }
    .section-label {
      font-family: var(--serif); font-size: 9.5pt;
      font-weight: 600; color: var(--dark);
      letter-spacing: 0.08em;
      padding: 1.5mm 3mm 1.5mm 2.5mm;
      border-left: 3px solid var(--black);
      background: var(--pale);
      margin-bottom: 3mm;
      display: flex; align-items: center; gap: 2mm;
    }
    .section-label .section-no {
      font-size: 7.5pt; color: var(--light);
      font-family: var(--sans); font-weight: 400;
      letter-spacing: 0.05em;
    }

    .overview-grid {
      display: grid; grid-template-columns: 30mm 1fr;
      border: 1px solid var(--rule); border-radius: 1px;
    }
    .ov-key {
      font-size: 8.5pt; font-weight: 500; color: var(--mid);
      background: var(--fill-empty);
      padding: 2.5mm 3mm;
      border-bottom: 1px solid var(--rule); border-right: 1px solid var(--rule);
      display: flex; align-items: center;
      letter-spacing: 0.03em; white-space: nowrap;
    }
    .ov-key:last-of-type, .ov-val:last-child { border-bottom: none; }
    .ov-val {
      font-size: 9pt; padding: 3mm 3.5mm;
      border-bottom: 1px solid var(--rule);
      display: flex; align-items: center;
      min-height: 11mm; line-height: 1.5;
    }

    .mgmt-grid {
      border: 1px solid var(--rule); border-radius: 1px; overflow: hidden;
    }
    .mgmt-row {
      display: grid; grid-template-columns: 32mm 1fr;
      border-bottom: 1px solid var(--rule);
    }
    .mgmt-row:last-child { border-bottom: none; }
    .mgmt-key {
      font-size: 8pt; font-weight: 500; color: var(--mid);
      background: var(--fill-empty);
      padding: 3mm 3mm; border-right: 1px solid var(--rule);
      display: flex; align-items: flex-start;
      padding-top: 3.5mm; letter-spacing: 0.02em; line-height: 1.4;
    }
    .mgmt-val {
      padding: 3mm 3.5mm; min-height: 14mm;
      display: flex; align-items: flex-start;
    }
    .mgmt-val .field-value { white-space: pre-line; }

    .emergency-box {
      border: 1px solid var(--rule); border-radius: 1px;
      padding: 3mm 4mm; min-height: 22mm; background: var(--white);
    }
    .emergency-box .field-value { white-space: pre-line; line-height: 1.7; }

    .opinion-box {
      border: 1px solid var(--rule); border-radius: 1px;
      min-height: 42mm; padding: 3mm 4mm;
      position: relative; background: var(--white);
    }
    .opinion-box .field-value { white-space: pre-line; line-height: 1.7; }
    .opinion-badge {
      position: absolute; top: 2.5mm; right: 3mm;
      font-size: 7pt; color: var(--light);
      border: 1px solid var(--pale);
      padding: 0.5mm 2mm; border-radius: 2px; letter-spacing: 0.05em;
    }

    /* ── 진행 상태 표시 ── */
    .phase-indicator {
      display: flex; gap: 4px; padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: #121a2a; flex-shrink: 0;
    }
    .phase-step {
      flex: 1; padding: 6px 8px; border-radius: 6px;
      font-size: 11px; text-align: center;
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .phase-step .p-icon { font-size: 14px; display: block; margin-bottom: 2px; }
    .phase-step.pending { background: transparent; color: var(--muted); }
    .phase-step.active {
      background: rgba(47,129,247,0.12);
      border-color: var(--accent); color: var(--accent);
    }
    .phase-step.done {
      background: rgba(63,185,80,0.1);
      border-color: var(--success); color: var(--success);
    }

    /* ── 채팅 ── */
    .chat-panel {
      width: 50%; display: flex; flex-direction: column;
      background: var(--surface);
    }
    .chat-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      background: #1c2333; flex-shrink: 0;
    }
    .chat-header .ai-name {
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .chat-header .ai-name .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .chat-header .ai-name .dot.auto { background: var(--success); }
    .chat-header .ai-name .dot.ask { background: var(--accent); }
    .chat-header .ai-name .dot.ai_generate { background: var(--warning); }
    .chat-header .ai-name .dot.manual { background: var(--muted); }
    .chat-header .ai-desc {
      font-size: 11px; color: var(--muted); margin-top: 2px;
    }
    .chat-header #phase-label {
      font-size: 11px; color: var(--muted); margin-top: 4px;
    }

    /* ── 필드 현황판 ── */
    .field-list {
      display: flex; flex-wrap: wrap; gap: 2px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      background: #0f1622;
      flex-shrink: 0; max-height: 80px; overflow-y: auto;
    }
    .field-list::-webkit-scrollbar { width: 3px; }
    .field-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .field-list-item {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; display: flex; align-items: center; gap: 4px;
    }
    .field-list-item.filled {
      background: rgba(63,185,80,0.12);
      color: var(--success);
      border: 1px solid rgba(63,185,80,0.2);
    }
    .field-list-item.empty {
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .field-list-item .fl-status { font-size: 8px; }
    .field-list-item .fl-label { font-weight: 400; }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      max-width: 85%; padding: 10px 14px;
      border-radius: 12px; font-size: 13px;
      line-height: 1.55; white-space: pre-wrap; word-wrap: break-word;
      animation: msgIn .25s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.bot {
      align-self: flex-start; background: #1c2333;
      border: 1px solid var(--border); color: var(--text);
      border-radius: 12px 12px 12px 4px;
    }
    .msg.user {
      align-self: flex-end; background: var(--accent);
      color: #fff; border-radius: 12px 12px 4px 12px;
    }
    .msg.system {
      align-self: center; background: transparent;
      color: var(--muted); font-size: 11px; text-align: center;
      border: none; padding: 4px 8px;
    }

    .typing {
      align-self: flex-start; display: flex; gap: 4px;
      padding: 12px 16px; background: #1c2333;
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 4px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); animation: dotBounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotBounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-area {
      display: flex; gap: 8px;
      padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-input-area input {
      flex: 1; padding: 9px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: #0d1117;
      color: var(--text); font-size: 13px; outline: none;
      font-family: var(--sans); transition: border-color .15s;
    }
    .chat-input-area input:focus { border-color: var(--accent); }
    .chat-input-area input::placeholder { color: #484f58; }
    .chat-input-area .btn-group { display: flex; gap: 6px; flex-shrink: 0; }
    .chat-input-area button {
      width: 38px; height: 38px;
      border-radius: 8px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background .15s;
    }
    #send-btn { background: var(--accent); color: #fff; }
    #send-btn:hover { background: var(--accent2); }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
    #auto-btn {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    #auto-btn:hover { color: var(--text); border-color: var(--muted); }
    #auto-btn.ai-ready { border-color: var(--warning); color: var(--warning); animation: pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── 인쇄 ── */
    @media print {
      body { background: white; overflow: visible; }
      .top-bar { display: none; }
      .phase-indicator { display: none; }
      .chat-panel { display: none; }
      .preview-panel { width: 100%; border: none; padding: 0; overflow: visible; }
      .a4-page {
        box-shadow: none; margin: 0;
        padding: 15mm 14mm 18mm 16mm;
      }
      .field-value.empty::after { display: none; }
      .field-value.empty { border-bottom-color: #999; }
      .field-value.highlight, .field-value.done-highlight { background: transparent !important; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>

  <!-- 상단 바 -->
  <div class="top-bar">
    <button class="back-btn" onclick="window.location.href='/devnote/doc-builder'">← 문서 목록</button>
    <div class="title">
      📋 일요일 공사 승인 요청서
      <small id="progress-text">0/10 항목</small>
    </div>
    <button id="print-btn" onclick="window.print()">🖨 PDF 출력</button>
  </div>

  <!-- 진행 상태 -->
  <div class="phase-indicator" id="phase-indicator">
    <div class="phase-step" data-phase="auto">
      <span class="p-icon">📋</span> 정보입력
    </div>
    <div class="phase-step" data-phase="ask">
      <span class="p-icon">✏️</span> 내용파악
    </div>
    <div class="phase-step" data-phase="ai_generate">
      <span class="p-icon">🤖</span> AI 작성
    </div>
    <div class="phase-step" data-phase="manual">
      <span class="p-icon">✅</span> 완료
    </div>
  </div>

  <!-- 메인 레이아웃 -->
  <div class="main-layout">

    <!-- ── 왼쪽: A4 미리보기 ── -->
    <div class="preview-panel">
      {% include 'doc_builder/sunday_approval/template.html' %}
    </div>

    <!-- ── 오른쪽: 채팅 패널 ── -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="ai-name">
          <span class="dot" id="status-dot"></span>
          AI 문서 도우미
        </div>
        <div class="ai-desc" id="phase-desc">3단계 자동 문서 작성</div>
      </div>
      <div class="field-list" id="field-list"></div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off">
        <div class="btn-group">
          <button id="auto-btn" title="AI 자동 생성" onclick="triggerAutoGenerate()">🤖</button>
          <button id="send-btn">➤</button>
        </div>
      </div>
    </div>

  </div>

  <script>
  (function() {
    'use strict';

    var API_URL = '/devnote/doc-builder/sunday/chat';
    var fieldLabels = {
      'project_name': '공사명',
      'contractor': '시공사',
      'supervision': '건설사업관리단',
      'work_date': '공사예정일',
      'location': '공종 및 위치',
      'main_work_content': '주요 작업 내용',
      'worker_count': '작업 근로자수',
      'equipment': '작업 장비',
      'site_manager': '일요일 공사 책임자',
      'work_reason': '일요일 공사 시행 사유',
      'safety_plan': '안전 조치 계획',
      'emergency_plan': '비상시 대응체계',
      'supervisor_opinion': '건설사업단 의견'
    };
    var requiredFields = [
      'work_date', 'location', 'work_reason',
      'main_work_content', 'safety_plan', 'worker_count',
      'equipment', 'site_manager', 'emergency_plan', 'supervisor_opinion'
    ];
    var autoFields = ['project_name', 'contractor', 'supervision'];
    var askFields = ['work_date', 'location', 'main_work_content', 'worker_count', 'equipment', 'site_manager'];
    var aiFields = ['work_reason', 'safety_plan', 'emergency_plan'];

    var messages = [];
    var completedFields = {};
    var currentPhase = 'auto';

    var chatEl = document.getElementById('chat-messages');
    var inputEl = document.getElementById('chat-input');
    var sendBtn = document.getElementById('send-btn');
    var autoBtn = document.getElementById('auto-btn');
    var printBtn = document.getElementById('print-btn');
    var progressText = document.getElementById('progress-text');
    var statusDot = document.getElementById('status-dot');
    var phaseDesc = document.getElementById('phase-desc');

    // 초기 fields
    var initFields = {{ fields_json | safe }};
    Object.keys(initFields).forEach(function(k) {
      if (initFields[k] && initFields[k] !== '') {
        completedFields[k] = true;
      }
    });
    // auto 필드도 완료 처리
    autoFields.forEach(function(k) { completedFields[k] = true; });

    function scrollChat() { chatEl.scrollTop = chatEl.scrollHeight; }

    function addMessage(text, role) {
      var div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chatEl.appendChild(div);
      scrollChat();
    }

    function addSystemMessage(text) {
      var div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = text;
      chatEl.appendChild(div);
      scrollChat();
    }

    function showTyping() {
      var div = document.createElement('div');
      div.className = 'typing'; div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(div);
      scrollChat();
    }

    function hideTyping() {
      var el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function updateProgress() {
      var done = 0;
      requiredFields.forEach(function(f) {
        if (completedFields[f]) done++;
      });
      progressText.textContent = done + '/' + requiredFields.length + ' 항목';
      printBtn.classList.toggle('active', done >= requiredFields.length);
    }

    function updateFieldList() {
      var list = document.getElementById('field-list');
      if (!list) return;
      list.innerHTML = '';
      requiredFields.forEach(function(key) {
        var el = document.createElement('div');
        el.className = 'field-list-item' + (completedFields[key] ? ' filled' : ' empty');
        var label = fieldLabels[key] || key;
        var val = completedFields[key] ? '✓' : '○';
        el.innerHTML = '<span class="fl-status">' + val + '</span><span class="fl-label">' + label + '</span>';
        list.appendChild(el);
      });
    }

    function setPhase(phase) {
      currentPhase = phase;
      var steps = document.querySelectorAll('.phase-step');
      steps.forEach(function(s) {
        var p = s.getAttribute('data-phase');
        s.classList.remove('active', 'done', 'pending');
        if (p === phase) s.classList.add('active');
        else if (isPhaseDone(p)) s.classList.add('done');
        else s.classList.add('pending');
      });

      var phaseLabels = {
        'auto': '📋 자동 정보 입력',
        'ask': '✏️ 공사 내용 파악',
        'ai_generate': '🤖 AI 문서 작성',
        'manual': '✅ 검토 완료'
      };
      phaseDesc.textContent = phaseLabels[phase] || phase;

      var dotColors = {
        'auto': 'var(--success)',
        'ask': 'var(--accent)',
        'ai_generate': 'var(--warning)',
        'manual': 'var(--muted)'
      };
      statusDot.style.background = dotColors[phase] || 'var(--muted)';

      autoBtn.classList.toggle('ai-ready', phase === 'ai_generate');
    }

    function isPhaseDone(phase) {
      var fields;
      if (phase === 'auto') fields = autoFields;
      else if (phase === 'ask') fields = askFields;
      else if (phase === 'ai_generate') fields = aiFields;
      else return false;
      return fields.every(function(f) { return completedFields[f]; });
    }

    function getCurrentPhase() {
      if (!isPhaseDone('auto')) return 'auto';
      if (!isPhaseDone('ask')) return 'ask';
      if (!isPhaseDone('ai_generate')) return 'ai_generate';
      return 'manual';
    }

    function setField(fieldKey, value) {
      if (!fieldKey || fieldKey === 'null' || !value) return;
      // 필드 값이 객체(dict)면 각각 처리
      if (typeof value === 'object') {
        Object.keys(value).forEach(function(k) {
          setField(k, value[k]);
        });
        return;
      }

      var el = document.querySelector('[data-field="' + fieldKey + '"]');
      if (!el) return;
      var val = String(value);
      if (!val) return;

      el.textContent = val;
      el.classList.remove('empty', 'highlight', 'done-highlight');
      void el.offsetWidth;
      el.classList.add(completedFields[fieldKey] ? 'done-highlight' : 'highlight');
      setTimeout(function() { el.classList.remove('highlight'); }, 1500);
      completedFields[fieldKey] = true;
      updateProgress();
      updateFieldList();
      var newPhase = getCurrentPhase();
      if (newPhase !== currentPhase) setPhase(newPhase);
    }

    function sendMessage(text) {
      if (!text.trim()) return;
      inputEl.value = '';
      addMessage(text, 'user');

      var phase = getCurrentPhase();
      messages.push({ role: 'user', content: text });

      showTyping();
      inputEl.disabled = true;
      sendBtn.disabled = true;

      var xhr = new XMLHttpRequest();
      xhr.open('POST', API_URL, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function() {
        hideTyping();
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            messages.push({ role: 'assistant', content: data.reply });
            addMessage(data.reply, 'bot');

            // AI 키-값 저장: field/value 페어
            if (data.field && data.field !== 'null' && data.value) {
              setField(data.field, data.value);
            }
            // 전체 fields 업데이트 (서버가 항상 최신 상태 반환)
            if (data.fields) {
              Object.keys(data.fields).forEach(function(k) {
                if (data.fields[k] && data.fields[k] !== '') {
                  setField(k, data.fields[k]);
                }
              });
            }
            if (data.completed) {
              addSystemMessage('✅ 모든 항목이 작성되었습니다! "PDF 출력" 버튼을 눌러 출력하세요.');
            }
          } catch(e) {
            addSystemMessage('응답 처리 중 오류 (' + e.message + ')');
          }
        } else {
          addSystemMessage('서버 통신 오류 (' + xhr.status + ')');
        }
      };
      xhr.onerror = function() {
        hideTyping();
        inputEl.disabled = false;
        sendBtn.disabled = false;
        addSystemMessage('네트워크 오류.');
      };
      xhr.send(JSON.stringify({ messages: messages, phase: phase }));
    }

    window.triggerAutoGenerate = function() {
      if (getCurrentPhase() !== 'ai_generate') {
        addSystemMessage('⚠️ 먼저 채팅으로 공사 내용을 입력해주세요.');
        return;
      }
      sendMessage('🤖 AI 자동 생성');
    };

    sendBtn.addEventListener('click', function() { sendMessage(inputEl.value); });
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); sendMessage(inputEl.value); }
    });

    // ── 초기화 ──
    updateProgress();
    updateFieldList();
    setPhase('ask');
    addMessage('📋 일요일 공사 승인 요청서 작성을 시작합니다.\n\n먼저 **공사 예정일**을 알려주세요. (예: 이번주 일요일, 시간 포함)', 'bot');
    messages.push({ role: 'assistant', content: '공사 예정일을 알려주세요.' });
    inputEl.focus();
  })();
  </script>
</body>
</html>
